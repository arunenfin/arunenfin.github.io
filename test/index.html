    navigator.serviceWorker.getRegistrations().then(function(registrations) {
      for(let registration of registrations) { 
        let isActive = registration.active && (registration.active.scriptURL.indexOf("test/sw.js") > -1)
        let isWaiting = registration.waiting && (registration.waiting.scriptURL.indexOf("test/sw.js") > -1)
        if(isActive || isWaiting) {
          registration.unregister().then(function() { console.log("reload"); window.location.reload(); }).catch(console.log);
        }
      }
    }).catch(console.log);
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register("service-worker.js").catch(console.log); }
